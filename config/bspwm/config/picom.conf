#  ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēĚ ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ     ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ	01.10.2024 15:46:41
#  ‚Ėą‚Ėą‚ēĎ     ‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ ‚ēö‚ēź‚ēĚ ‚Ėą‚Ėą‚ēĎ
#  ‚ēö‚ēź‚ēĚ     ‚ēö‚ēź‚ēĚ ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēĚ     ‚ēö‚ēź‚ēĚ

## ----- Shadows ----- ##
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.75;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-color = "#000000"

## ----- Fading ----- ##
fading = true;
fade-in-step = 0.028;
fade-out-step = 0.028;
fade-delta = 8
no-fading-openclose = false
no-fading-destroyed-argb = false

## ----- Transparency ----- ##
frame-opacity = 1.0;
# inactive-dim-fixed = true

## ----- Corners ----- ##
corner-radius = 12

#################################
#       General Settings        #
#################################
# Available backends "xrender" "glx" "egl"
backend = "glx"
dithered-present = false;
vsync = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = false;
detect-client-leader = false;
use-ewmh-active-win = true;
unredir-if-possible = false;
# xrender-sync-fence = false
# transparent-clipping = false

# GLX backend settings for smoother performance
# glx-no-stencil = true;
# glx-no-rebind-pixmap = true;

#################################
#             Blur              #
#################################
blur:
	{
		method = "dual_kawase";
		strength = 8;
		background = false;
		background-frame = false;
		background-fixed = false;
	}

#################################
#             Rules             #
#################################
rules: (
	{
		blur-background = false;
		fade = false;
	},
	{
		match = "window_type = 'normal'";
		fade = true;
		shadow = true;
        corner-radius = 12;
		fade = true;
		blur-background = true;
		opacity = 0.90;
	},
	{
		match = "window_type = 'dialog'";
		shadow = true;
	},
	{
		match = "window_type = 'tooltip'";
		corner-radius = 8;
		opacity = 0.95;
		shadow = true;
		blur-background = true;
	},
    {
		match = "fullscreen";
		corner-radius = 0;
	},
	{
		match = "window_type = 'dock'";
		corner-radius = 12;
		fade = true;
		blur-background = true;
		opacity = 0.85;
	},
	{
		match = "window_type = 'dropdown_menu' || window_type = 'menu' || window_type = 'popup' || window_type = 'popup_menu'";
		corner-radius = 8;
	},
    {
        # Fix shadow related bugs on small UI elements
        match = "window_type = 'menu' || role = 'popup' || role = 'bubble'";
        shadow = false;
    },
	{
		match = "class_g = 'Alacritty' || class_g = 'st-256color' || class_g = 'kitty' || class_g = 'FloaTerm'";
		opacity = 0.75;
		blur-background = true;
	},
	{
		match = "class_g = 'bspwm-scratch' || class_g = 'Updating' || class_g = 'Voiceassistantoverlay'";
		opacity = 0.70;
		blur-background = true;
	},
	{
		match = "class_g = 'Rofi'";
		opacity = 0.75;
		blur-background = true;
		corner-radius = 12;
	},
	{
		match = "class_g = 'Polybar' || class_g = 'eww-bar'";
		corner-radius = 0;
		blur-background = true;
        unredir-if-possible = false;
	},
	{
		match = "class_g = 'Viewnior'	|| "
				"class_g = 'mpv'		|| "
				"class_g = 'Dunst'		|| "
				"class_g = 'retroarch'";
		corner-radius = 14;
	},
	{
		match = "name = 'Notification'		|| "
				"class_g ?= 'Notify-osd'    || "
				"class_g = 'Dunst'";
		shadow = true;
		blur-background = true;
		opacity = 0.75;
	},
	{
		match = "class_g = 'Polybar'		|| "
				"class_g = 'Eww'			|| "
				"class_g = 'jgmenu'			|| "
				"class_g = 'bspwm-scratch'	|| "
				"class_g = 'Spotify'		|| "
				"class_g = 'retroarch'		|| "
				"class_g = 'firefox'		|| "
				"class_g = 'Screenkey'		|| "
				"class_g = 'mpv'			|| "
				"class_g = 'Viewnior'		|| "
				"_GTK_FRAME_EXTENTS@";
		shadow = false;
	},


# >>> bspwm-slidefx picom animation >>>
# Managed by bspwm-slidefx. Re-run 'bspwm-slidefx setup-picom' to update values.
{
    match = "_MY_CUSTOM_WORKSPACE_SWITCH@ = 1 && window_type = 'normal' && !class_g = 'Polybar' && !class_g = 'eww-bar' && !class_g = 'Dunst'";
    animations = (
        {
            triggers = ["show"];
            offset-x = {
                curve = "cubic-bezier(0.25, 0.46, 0.45, 0.94)";
                start = "-1920";
                end = "0";
                duration = 0.3;
            };
            shadow-offset-x = "offset-x";
        },
        {
            triggers = ["hide"];
            opacity = {
                curve = "linear";
                duration = 0.3;
                start = "window-raw-opacity-before";
                end = "window-raw-opacity-before";
            };
            blur-opacity = 0;
            shadow-opacity = "opacity";
            offset-x = {
                curve = "cubic-bezier(0.25, 0.46, 0.45, 0.94)";
                start = "0";
                end = "-1920";
                duration = 0.2;
            };
            shadow-offset-x = "offset-x";
        }
    );
},

{
    match = "_MY_CUSTOM_WORKSPACE_SWITCH@ = 2 && window_type = 'normal' && !class_g = 'Polybar' && !class_g = 'eww-bar' && !class_g = 'Dunst'";
    animations = (
        {
            triggers = ["show"];
            offset-x = {
                curve = "cubic-bezier(0.25, 0.46, 0.45, 0.94)";
                start = "1920";
                end = "0";
                duration = 0.3;
            };
            shadow-offset-x = "offset-x";
        },
        {
            triggers = ["hide"];
            opacity = {
                curve = "linear";
                duration = 0.3;
                start = "window-raw-opacity-before";
                end = "window-raw-opacity-before";
            };
            blur-opacity = 0;
            shadow-opacity = "opacity";
            offset-x = {
                curve = "cubic-bezier(0.25, 0.46, 0.45, 0.94)";
                start = "0";
                end = "1920";
                duration = 0.2;
            };
            shadow-offset-x = "offset-x";
        }
    );
}
# <<< bspwm-slidefx picom animation <<<
)


