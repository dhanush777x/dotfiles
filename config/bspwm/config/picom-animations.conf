# Workspace slide animation - sliding right (to higher workspace)
{
    match = "_MY_CUSTOM_WORKSPACE_SWITCH@ = 1 && window_type = 'normal' && !class_g = 'Polybar' && !class_g = 'eww-bar' && !class_g = 'Dunst'";
    animations = (
        {
            triggers = ["show"];
            offset-x = {
                curve = "cubic-bezier(0.25, 0.46, 0.45, 0.94)";
                start = "-1920";
                end = "0";
                duration = 0.3;
            };
            shadow-offset-x = "offset-x";
        },
        {
            triggers = ["hide"];
            opacity = {
                curve = "linear";
                duration = 0.3;
                start = "window-raw-opacity-before";
                end = "window-raw-opacity-before";
            };
            blur-opacity = 0;
            shadow-opacity = "opacity";
            offset-x = {
                curve = "cubic-bezier(0.25, 0.46, 0.45, 0.94)";
                start = "0";
                end = "-1920";
                duration = 0.2;
            };
            shadow-offset-x = "offset-x";
        }
    )
},

