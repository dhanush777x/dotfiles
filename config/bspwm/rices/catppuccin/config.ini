[global/wm]

margin-bottom = 0
margin-top = 0

include-file = ../../config/system.ini
include-file = modules.ini

[color]
bg = #00000000
fg = #CDD6F4
mb = #181825

red = #F38BA8
pink = #F5C2E7
purple = #B4BEFE
blue = #89B4FA
blue-arch = #89B4FA
cyan = #94E2D5
teal = #94E2D5
green = #A6E3A1
lime = #A6E3A1
yellow = #F9E2AF
amber = #F9E2AF
orange = #FAB387
brown = #DDB6A9
grey = #7F849C
indigo = #B4BEFE
blue-gray = #6C7086

[bar/emi-bar]
monitor = ${env:MONITOR:}
monitor-strict = false
override-redirect = false

bottom = false
fixed-center = true

width = 99%
height = 26

offset-x = 0.5%
offset-y = 2

background = ${color.bg}
foreground = ${color.fg}

radius = 4.0

line-size = 2
line-color = ${color.blue}

border-size = 8px
border-color = ${color.bg}

padding = 1

module-margin-left = 0
module-margin-right = 0

; Text
font-0 = "JetBrainsMono Nerd Font:style=Bold:pixelsize=9;3"
; Icons
font-1 = "Font Awesome 6 Free Solid:size=10;3"
font-2 = "Material Design Icons Desktop:size=11;3"
font-3 = "Material Design Icons Desktop:size=15;4"
; Glyphs
font-4 = "MesloLGS NF:style=Regular:pixelsize=17;4"
;dpi = 96

;Modules availables but not active:
;		brightness		weather		xkeyboard
modules-left = launcher dots bi cpu_bar bd sep bi memory_bar bd sep bi filesystem bd 
modules-center = bi bspwm bd
modules-right = mplayer sep mpd sep bluetooth sep bi battery network bd sep bi pulseaudio bd sep bi brightness bd sep bi date bd sep tray sep power

separator =
dim-value = 1.0

;;locale = es_MX.UTF-8

wm-restack = bspwm
enable-ipc = true

cursor-click = pointer
cursor-scroll =

[settings]

screenchange-reload = false

compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over

pseudo-transparency = false
